<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>موسوعة النور</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Amiri&display=swap" rel="stylesheet">

<style>

body{

font-family:'Cairo';

background:#f5f5f5;

}

.quran{

font-family:'Amiri';

font-size:24px;

line-height:2.2;

}

.card{

background:white;

padding:20px;

border-radius:15px;

box-shadow:0 5px 20px rgba(0,0,0,0.05);

}

.page{

display:none;

}

.page.active{

display:block;

}

</style>

</head>

<body class="p-4 max-w-3xl mx-auto">



<h1 class="text-2xl font-black text-center mb-6">

موسوعة النور الإسلامية

</h1>



<div class="flex flex-wrap gap-2 justify-center mb-6">

<button onclick="nav('home')" class="card">الرئيسية</button>

<button onclick="nav('quran')" class="card">المصحف</button>

<button onclick="nav('hadith')" class="card">الحديث</button>

<button onclick="nav('azkar')" class="card">الأذكار</button>

<button onclick="nav('tasbeeh')" class="card">السبحة</button>

<button onclick="nav('wheel')" class="card">آية عشوائية</button>

</div>



<!-- الصفحة الرئيسية -->

<div id="home" class="page active">

<div class="card">

<h2 class="font-bold mb-4">مواقيت الصلاة</h2>

<div id="prayers"></div>

</div>

</div>



<!-- القرآن -->

<div id="quran" class="page">

<div class="card">

<h2 class="font-bold mb-4">سور القرآن</h2>

<div id="surahs"></div>

</div>



<div id="ayahs" class="card mt-4 quran"></div>

<audio id="audio" controls class="w-full mt-4"></audio>

</div>



<!-- الحديث -->

<div id="hadith" class="page">

<div class="card mb-4">

<h2 class="font-bold mb-4">كتب الحديث</h2>



<div class="flex flex-wrap gap-2">

<button onclick="hadith('bukhari')" class="card">البخاري</button>

<button onclick="hadith('muslim')" class="card">مسلم</button>

<button onclick="hadith('tirmidhi')" class="card">الترمذي</button>

<button onclick="hadith('abudawud')" class="card">أبو داود</button>

<button onclick="hadith('nasai')" class="card">النسائي</button>

<button onclick="hadith('ibnumajah')" class="card">ابن ماجه</button>

</div>

</div>



<div id="hadiths"></div>

</div>



<!-- الأذكار -->

<div id="azkar" class="page">

<div class="card">

<h2 class="font-bold mb-4">أذكار حصن المسلم</h2>

<div id="azkarList"></div>

</div>

</div>



<!-- السبحة -->

<div id="tasbeeh" class="page text-center">

<div class="card">

<h2 class="text-xl font-bold mb-6">السبحة الإلكترونية</h2>



<p id="zekr" class="text-xl mb-4">سبحان الله</p>



<div id="count" class="text-5xl font-black mb-6">

0

</div>



<button onclick="tasbeeh()" class="bg-green-700 text-white px-6 py-3 rounded">

تسبيح

</button>



<button onclick="reset()" class="block mx-auto mt-4 text-red-500">

إعادة

</button>

</div>

</div>



<!-- عجلة الآية -->

<div id="wheel" class="page text-center">

<div class="card">

<h2 class="font-bold mb-6">آية عشوائية</h2>



<button onclick="randomAyah()" class="bg-green-700 text-white px-6 py-3 rounded">

إظهار آية

</button>



<p id="randomAyah" class="quran mt-6"></p>

</div>

</div>



<script>



function nav(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")

}



///// مواقيت الصلاة

fetch("https://api.aladhan.com/v1/timingsByCity?city=Cairo&country=Egypt&method=5")

.then(r=>r.json())

.then(d=>{

let t=d.data.timings

document.getElementById("prayers").innerHTML=`

الفجر : ${t.Fajr}<br>

الظهر : ${t.Dhuhr}<br>

العصر : ${t.Asr}<br>

المغرب : ${t.Maghrib}<br>

العشاء : ${t.Isha}

`

})



///// السور

fetch("https://api.alquran.cloud/v1/surah")

.then(r=>r.json())

.then(d=>{

document.getElementById("surahs").innerHTML=d.data.map(s=>`

<button onclick="openSurah(${s.number})" class="card m-1">

${s.number} - ${s.name}

</button>

`).join("")

})



function openSurah(n){

fetch(`https://api.alquran.cloud/v1/surah/${n}/ar.alafasy`)

.then(r=>r.json())

.then(d=>{

document.getElementById("ayahs").innerHTML=d.data.ayahs.map(a=>a.text).join(" ")

document.getElementById("audio").src=d.data.ayahs[0].audio

})

}



//// الحديث

function hadith(book){

fetch(`https://hadis-api-id.vercel.app/hadith/${book}?range=1-20`)

.then(r=>r.json())

.then(d=>{

document.getElementById("hadiths").innerHTML=d.items.map(h=>`

<div class="card mb-3">

${h.arab}

</div>

`).join("")

})

}



//// الأذكار

fetch("https://www.hisnmuslim.com/api/ar/husn_ar.json")

.then(r=>r.json())

.then(d=>{

document.getElementById("azkarList").innerHTML=d.slice(0,40).map(z=>`

<div class="card mb-3">

<h3 class="font-bold mb-2">${z.title}</h3>

<p>${z.content}</p>

</div>

`).join("")

})



//// السبحة

let c=0

function tasbeeh(){

c++

document.getElementById("count").innerText=c

}



function reset(){

c=0

document.getElementById("count").innerText=0

}



//// آية عشوائية

function randomAyah(){

let r=Math.floor(Math.random()*6236)+1

fetch(`https://api.alquran.cloud/v1/ayah/${r}/ar.alafasy`)

.then(r=>r.json())

.then(d=>{

document.getElementById("randomAyah").innerText=d.data.text

})

}



</script>



</body>

</html>
